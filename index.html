<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVENTORY VIEWER</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Teko:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #080809;
    --bg2:     #0f0f12;
    --panel:   #111114;
    --panel2:  #18181e;
    --border:  #1e1e26;
    --border2: #2e1520;
    --border3: #4a1a28;
    --red:     #b91c1c;
    --red2:    #ef4444;
    --red3:    #ff6b6b;
    --redglow: rgba(185,28,28,0.45);
    --redglow2:rgba(239,68,68,0.10);
    --text:    #f0e8e0;
    --text2:   #8a7a6a;
    --text3:   #504030;
    --gold:    #d4a843;
    --green:   #22c55e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  /* subtle scanline */
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(185,28,28,.018) 3px,rgba(185,28,28,.018) 4px);
  }

  /* ═══ HEADER ═══ */
  header{
    position:sticky;top:0;z-index:50;
    background:rgba(8,8,9,.95);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--border3);
    box-shadow:0 1px 30px rgba(185,28,28,.12);
  }
  .header-inner{
    max-width:1500px;margin:0 auto;
    display:grid;
    grid-template-columns:auto 1fr auto;
    align-items:center;gap:20px;padding:10px 24px;
  }

  /* logo */
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-mark{
    width:36px;height:36px;position:relative;
    display:flex;align-items:center;justify-content:center;
  }
  .logo-mark::before{
    content:'';position:absolute;inset:0;
    border:2px solid var(--red);
    clip-path:polygon(0 20%,20% 0,100% 0,100% 80%,80% 100%,0 100%);
    box-shadow:0 0 12px var(--redglow);
  }
  .logo-mark::after{
    content:'';position:absolute;inset:5px;
    border:1px solid var(--red2);opacity:.35;
    clip-path:polygon(0 20%,20% 0,100% 0,100% 80%,80% 100%,0 100%);
  }
  .logo-inner{
    font-family:'Teko',sans-serif;font-size:14px;font-weight:700;
    color:var(--red2);letter-spacing:1px;position:relative;z-index:1;
  }
  .logo-text{font-family:'Teko',sans-serif;font-size:24px;font-weight:600;letter-spacing:5px;line-height:1;}
  .logo-text em{color:var(--red2);font-style:normal;}
  .logo-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:3px;margin-top:1px;}

  /* header middle — search */
  .hdr-search{position:relative;max-width:400px;width:100%;}
  .hdr-search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--text3);pointer-events:none;}
  .search-input{
    width:100%;background:var(--panel);
    border:1px solid var(--border);color:var(--text);
    font-family:'Rajdhani',sans-serif;font-size:14px;
    padding:8px 12px 8px 34px;outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  .search-input::placeholder{color:var(--text3);}
  .search-input:focus{border-color:var(--red);box-shadow:0 0 0 1px var(--red),0 0 20px var(--redglow2);}

  /* header right */
  .hdr-right{display:flex;align-items:center;gap:20px;}
  .status-block{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .status-pill{display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:blink 2s infinite;}
  .dot.off{background:var(--red);box-shadow:0 0 10px var(--red);animation:none;}
  .dot.warn{background:#f59e0b;box-shadow:0 0 10px #f59e0b;animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .ts{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red2);letter-spacing:1px;}

  /* ═══ SUBBAR — filters + sort ═══ */
  .subbar{
    background:var(--bg2);
    border-bottom:1px solid var(--border);
  }
  .subbar-inner{
    max-width:1500px;margin:0 auto;
    display:flex;align-items:center;gap:10px;padding:8px 24px;flex-wrap:wrap;
  }
  .filter-tabs{display:flex;gap:4px;flex-wrap:wrap;flex:1;}
  .ftab{
    padding:5px 14px;border:1px solid var(--border);background:transparent;
    color:var(--text2);font-family:'Rajdhani',sans-serif;font-size:12px;
    font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .15s;text-transform:uppercase;
  }
  .ftab:hover{border-color:var(--red2);color:var(--text);}
  .ftab.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 12px var(--redglow);}
  .sort-sel{
    background:var(--panel);border:1px solid var(--border);color:var(--text);
    font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
    padding:5px 11px;cursor:pointer;outline:none;letter-spacing:1px;
  }
  .sort-sel option{background:var(--panel2);}

  /* ═══ STATS BAR ═══ */
  .statsbar{
    background:var(--bg);
    border-bottom:1px solid var(--border);
  }
  .statsbar-inner{
    max-width:1500px;margin:0 auto;
    display:flex;align-items:stretch;gap:0;padding:0 24px;
    overflow-x:auto;scrollbar-width:none;
  }
  .statsbar-inner::-webkit-scrollbar{display:none;}
  .stat-item{
    display:flex;flex-direction:column;justify-content:center;
    padding:8px 20px;border-right:1px solid var(--border);
    min-width:max-content;gap:2px;
  }
  .stat-item:first-child{padding-left:0;}
  .stat-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;}
  .stat-val{font-family:'Teko',sans-serif;font-size:20px;font-weight:600;color:var(--gold);line-height:1;}
  .stat-item.total .stat-val{color:var(--red2);}

  /* ═══ MAIN GRID ═══ */
  .main{max-width:1500px;margin:0 auto;padding:20px 24px 60px;}
  .cat-sec{margin-bottom:28px;}
  .cat-hdr{
    display:flex;align-items:center;gap:10px;
    margin-bottom:12px;padding-bottom:8px;
    border-bottom:1px solid var(--border2);position:relative;
  }
  .cat-hdr::after{
    content:'';position:absolute;left:0;bottom:-1px;
    width:60px;height:2px;background:var(--red);box-shadow:0 0 10px var(--redglow);
  }
  .cat-name{font-family:'Teko',sans-serif;font-size:18px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--red2);}
  .cat-count{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text3);background:var(--panel);border:1px solid var(--border);padding:2px 7px;letter-spacing:1px;}

  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;}
  @media(max-width:600px){.item-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px;}}

  /* ═══ CARD ═══ */
  .card{
    background:var(--panel);border:1px solid var(--border);
    padding:12px 8px 10px;
    display:flex;flex-direction:column;align-items:center;gap:6px;
    transition:border-color .15s,box-shadow .15s,transform .15s;
    position:relative;overflow:hidden;
    animation:fadeUp .3s ease both;
    cursor:default;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--redglow2) 0%,transparent 55%);opacity:0;transition:opacity .2s;}
  .card:hover{border-color:var(--red);box-shadow:0 0 18px var(--redglow2),inset 0 0 0 1px rgba(185,28,28,.1);transform:translateY(-2px);}
  .card:hover::before{opacity:1;}
  /* rarity borders */
  .card.leg{border-color:#6b4500;}
  .card.leg:hover{border-color:var(--gold);box-shadow:0 0 18px rgba(212,168,67,.3);}
  .card.epic{border-color:#3b0f60;}
  .card.epic:hover{border-color:#a855f7;box-shadow:0 0 18px rgba(168,85,247,.25);}
  .card.rare{border-color:#1a2f60;}
  .card.rare:hover{border-color:#3b82f6;box-shadow:0 0 18px rgba(59,130,246,.25);}

  .img-wrap{width:54px;height:54px;display:flex;align-items:center;justify-content:center;}
  .item-img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(0,0,0,.7));transition:filter .2s;}
  .card:hover .item-img{filter:drop-shadow(0 0 8px var(--redglow)) drop-shadow(0 2px 6px rgba(0,0,0,.7));}
  .no-img{width:100%;height:100%;background:var(--panel2);border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text3);}

  .iname{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;color:var(--text);text-align:center;line-height:1.2;letter-spacing:.3px;}
  .iextra{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--gold);text-align:center;}
  .iqty-wrap{perspective:200px;display:inline-block;}
  .iqty{font-family:'Teko',sans-serif;font-size:20px;font-weight:600;color:var(--red2);line-height:1;display:inline-block;transform-origin:center;}
  .iqty.flip-out{animation:flipOut .15s ease-in forwards;}
  .iqty.flip-in{animation:flipIn .2s ease-out forwards;}
  @keyframes flipOut{from{transform:rotateX(0);opacity:1}to{transform:rotateX(90deg);opacity:0;color:#4eff8a}}
  @keyframes flipIn{from{transform:rotateX(-90deg);opacity:0;color:#4eff8a}to{transform:rotateX(0);opacity:1;color:var(--red2)}}

  /* ═══ VIEW SWITCHER ═══ */
  .viewbar{
    background:var(--bg);
    border-bottom:2px solid var(--border3);
  }
  .viewbar-inner{
    max-width:1500px;margin:0 auto;
    display:flex;align-items:stretch;gap:0;padding:0 24px;
  }
  .vtab{
    padding:10px 28px;border:none;background:transparent;
    color:var(--text2);font-family:'Teko',sans-serif;font-size:16px;
    font-weight:600;letter-spacing:3px;cursor:pointer;
    border-bottom:2px solid transparent;margin-bottom:-2px;
    transition:all .15s;text-transform:uppercase;
  }
  .vtab:hover{color:var(--text);}
  .vtab.active{color:var(--red2);border-bottom-color:var(--red);}

  /* ═══ STATS PANEL ═══ */
  .stats-panel{max-width:1500px;margin:0 auto;padding:20px 24px 60px;display:none;}
  .stats-panel.visible{display:block;}

  /* Wave top bar */
  .sp-top{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel);border:1px solid var(--border3);
    padding:18px 24px;margin-bottom:14px;
    box-shadow:inset 0 0 40px rgba(185,28,28,.04);
  }
  .sp-wave-label{
    font-family:'Share Tech Mono',monospace;font-size:9px;
    color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;
  }
  .sp-wave-num{
    font-family:'Teko',sans-serif;font-size:52px;font-weight:700;
    color:var(--text);line-height:1;letter-spacing:2px;
  }
  .sp-wave-num span{color:var(--red2);}
  .sp-wave-status{
    font-family:'Share Tech Mono',monospace;font-size:10px;
    color:var(--text2);margin-top:5px;letter-spacing:2px;
  }
  .sp-updated{
    font-family:'Share Tech Mono',monospace;font-size:9px;
    color:var(--text3);letter-spacing:1px;
  }

  /* Section header */
  .sp-section{margin-bottom:16px;}
  .sp-section-hdr{
    font-family:'Teko',sans-serif;font-size:13px;font-weight:600;
    letter-spacing:4px;color:var(--red2);text-transform:uppercase;
    padding-bottom:8px;border-bottom:1px solid var(--border2);
    margin-bottom:10px;display:flex;align-items:center;gap:8px;
  }
  .sp-section-hdr::before{
    content:'';display:inline-block;width:3px;height:13px;
    background:var(--red);box-shadow:0 0 6px var(--redglow);
  }

  /* Equipment row */
  .sp-equip-grid{display:flex;gap:8px;flex-wrap:wrap;}
  .sp-equip-item{
    background:var(--panel);border:1px solid var(--border);
    padding:10px 16px;display:flex;flex-direction:column;gap:5px;
    min-width:150px;transition:border-color .15s,box-shadow .15s;
  }
  .sp-equip-item:hover{border-color:var(--red);box-shadow:0 0 12px var(--redglow2);}
  .sp-equip-type{
    font-family:'Share Tech Mono',monospace;font-size:9px;
    color:var(--text3);letter-spacing:2px;text-transform:uppercase;
  }
  .sp-equip-val{
    display:flex;align-items:center;gap:7px;
    font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--gold);
  }
  .sp-equip-icon{
    width:22px;height:22px;object-fit:contain;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.7));flex-shrink:0;
  }

  /* Stat cards grid */
  .sp-stat-cards{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;
  }
  .sp-stat-card{
    background:var(--panel);border:1px solid var(--border);
    padding:13px 15px;transition:border-color .15s,box-shadow .15s;
    position:relative;overflow:hidden;
  }
  .sp-stat-card::before{
    content:'';position:absolute;top:0;left:0;width:3px;height:100%;
    background:var(--red);opacity:.4;
  }
  .sp-stat-card:hover{border-color:var(--red2);box-shadow:0 0 14px var(--redglow2);}
  .sp-card-cat{
    font-family:'Share Tech Mono',monospace;font-size:9px;
    color:var(--red2);letter-spacing:3px;text-transform:uppercase;margin-bottom:7px;
  }
  .sp-card-name{
    display:flex;align-items:center;gap:8px;
    font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:600;
    color:var(--text);margin-bottom:9px;line-height:1.2;
  }
  .sp-card-icon{
    width:26px;height:26px;object-fit:contain;
    filter:drop-shadow(0 1px 5px rgba(0,0,0,.8));flex-shrink:0;
  }
  .sp-card-stats{display:flex;flex-wrap:wrap;gap:4px;}
  .sp-tag{
    font-family:'Share Tech Mono',monospace;font-size:10px;
    padding:3px 8px;background:var(--panel2);border:1px solid var(--border);
    color:var(--gold);letter-spacing:.2px;line-height:1.4;
  }
  .sp-tag.tag-red{color:var(--red3);border-color:var(--border3);background:rgba(185,28,28,.06);}
  .sp-tag.tag-blue{color:#60a5fa;border-color:#1a2f60;background:rgba(59,130,246,.06);}
  .sp-tag.tag-green{color:var(--green);border-color:#14532d;background:rgba(34,197,94,.06);}
  .sp-tag.tag-purple{color:#c084fc;border-color:#2d0f60;background:rgba(192,132,252,.06);}
  .sp-tag.tag-multi{color:#f59e0b;border-color:#451a03;background:rgba(245,158,11,.06);}

  .sp-empty-msg{
    font-family:'Share Tech Mono',monospace;font-size:10px;
    color:var(--text3);padding:24px;text-align:center;
  }

  /* main hide/show */
  .main{max-width:1500px;margin:0 auto;padding:20px 24px 60px;}
  .main.hidden{display:none;}
  .subbar.hidden{display:none;}
  .statsbar.hidden{display:none;}

  .empty-title{font-family:'Teko',sans-serif;font-size:22px;letter-spacing:4px;text-transform:uppercase;color:var(--text2);margin-bottom:8px;}
  .empty-sub{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text3);line-height:2;}

  /* BADGE +N */
  .badge-new{
    position:absolute;top:5px;right:5px;
    background:#052010;color:#4eff8a;
    font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:bold;
    padding:2px 5px;border:1px solid #22c55e;
    pointer-events:none;z-index:10;
    animation:badgePop .3s ease,badgeFade 2.5s ease forwards;
  }
  @keyframes badgePop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
  @keyframes badgeFade{0%,70%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark"><div class="logo-inner">INV</div></div>
      <div>
        <div class="logo-text">INVEN<em>TORY</em></div>
        <div class="logo-sub">REAL-TIME TRACKER</div>
      </div>
    </div>

    <div class="hdr-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke-linecap="round"/></svg>
      <input class="search-input" type="text" id="searchInput" placeholder="ค้นหาไอเทม..." oninput="render()">
    </div>

    <div class="hdr-right">
      <div class="status-block">
        <div class="status-pill">
          <div class="dot off" id="dot"></div>
          <span id="statusTxt">NOT CONNECTED</span>
        </div>
        <div class="ts" id="tsTxt">--:--:--</div>
      </div>
    </div>
  </div>
</header>

<!-- VIEW SWITCHER -->
<div class="viewbar">
  <div class="viewbar-inner">
    <button class="vtab active" id="vtab-inv"  onclick="switchView('inventory')">INVENTORY</button>
    <button class="vtab"        id="vtab-stats" onclick="switchView('stats')">STATS</button>
  </div>
</div>

<!-- INVENTORY CONTROLS -->
<div class="subbar" id="inv-subbar">
  <div class="subbar-inner">
    <div class="filter-tabs" id="filterTabs">
      <button class="ftab active" onclick="setFilter('all',this)">ALL</button>
    </div>
    <select class="sort-sel" id="sortSel" onchange="render()">
      <option value="name">ชื่อ A-Z</option>
      <option value="qty-desc">จำนวน ↓</option>
      <option value="qty-asc">จำนวน ↑</option>
    </select>
  </div>
</div>

<div class="statsbar" id="inv-statsbar">
  <div class="statsbar-inner" id="statsbar">
    <div class="stat-item total">
      <div class="stat-lbl">TOTAL ITEMS</div>
      <div class="stat-val" id="sItems">0</div>
    </div>
    <div class="stat-item total">
      <div class="stat-lbl">TOTAL QTY</div>
      <div class="stat-val" id="sQty">0</div>
    </div>
  </div>
</div>

<div class="main" id="main"></div>

<!-- STATS PANEL -->
<div class="stats-panel" id="stats-panel">

  <!-- Wave top bar -->
  <div class="sp-top">
    <div>
      <div class="sp-wave-label">DUNGEON WAVE</div>
      <div class="sp-wave-num" id="waveDisplay"><span>--</span></div>
      <div class="sp-wave-status" id="waveSub">NOT IN DUNGEON</div>
    </div>
    <div class="sp-updated" id="statsUpdated">LAST UPDATE: --</div>
  </div>

  <!-- Equipment -->
  <div class="sp-section">
    <div class="sp-section-hdr">EQUIPMENT</div>
    <div class="sp-equip-grid" id="spEquipGrid">
      <div class="sp-empty-msg">Waiting for equipment data...</div>
    </div>
  </div>

  <!-- Character Stat Cards -->
  <div class="sp-section">
    <div class="sp-section-hdr">CHARACTER STATS</div>
    <div class="sp-stat-cards" id="spStatCards">
      <div class="sp-empty-msg">Waiting for stats data from Lua...</div>
    </div>
  </div>

</div>

<script>
// ============================================================
// CONFIG
// ============================================================

const ICONS = {
  "Abyssal Outfit":"https://i.postimg.cc/tsDhtdxp/Abyssal-Outfit.png",
  "Abyss Edge":"https://i.postimg.cc/8fVJVs67/Abyss-Edge.png",
  "Abyss Sigil":"https://i.postimg.cc/m1GzGhHr/Abyss-Sigil.png",
  "Abyssal Empress":"https://i.postimg.cc/2bWbJnVN/Abyssal-Empress.png",
  "Adamantite":"https://i.postimg.cc/7GzGcSfT/Adamantite.png",
  "Aero Core":"https://i.postimg.cc/7JyGyb2g/Aero-Core.png",
  "Alter Armor":"https://i.postimg.cc/gLPXPrZs/Alter-Armor.png",
  "Alter Essence":"https://i.postimg.cc/p5thtyFG/Alter-Essence.png",
  "Anos Outfit":"https://i.postimg.cc/H84JWHw9/Anos-Outfit.png",
  "Atomic Core":"https://i.postimg.cc/q6XtB0sW/Atomic-Core.png",
  "Avenger Belt":"https://i.postimg.cc/p5Y9Vxf4/Avenger-Belt.png",
  "Blessed Maiden":"https://i.postimg.cc/jnQWqK6R/Blessed-Maiden.png",
  "Blood Ring":"https://i.postimg.cc/0Kd65xG5/Blood-Ring.png",
  "Blood Rune":"https://i.postimg.cc/vDWxt7J7/Blood-Rune.png",
  "Boss Key":"https://i.postimg.cc/fkxSf7Gc/Boss-Key.png",

function rarity(name) {
  const n = name.toLowerCase();
  if(['mythical','legendary','empress','escanor','ichigo','gryphon','jinwoo','saber alter'].some(k=>n.includes(k))) return 'leg';
  if(['epic','corrupt','imperial','calamity','shadow','abyssal','infinity','atomic'].some(k=>n.includes(k))) return 'epic';
  if(['rare','soul','crimson','dark','frozen','celestial','demonic'].some(k=>n.includes(k))) return 'rare';
  return '';
}

// ── SSE CONNECTION ──
function connectSSE() {
  setStatus('warn', 'CONNECTING...');
  const es = new EventSource('/events');
  es.onopen = () => setStatus('warn', 'WAITING FOR LUA...');
  es.onmessage = (e) => {
    try {
      const json = JSON.parse(e.data);
      if (json.type === 'inventory') {
        if (!json.inventory || !Object.keys(json.inventory).length) return;
        processData(json.inventory);
        setStatus('ok', 'ONLINE');
      } else if (json.type === 'stats') {
        processStats(json.stats, json.lastReceived);
        setStatus('ok', 'ONLINE');
      } else {
        // legacy format ไม่มี type
        if (json.inventory) { processData(json.inventory); setStatus('ok','ONLINE'); }
      }
    } catch {}
  };
  es.onerror = () => {
    setStatus('off', 'DISCONNECTED...');
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── PARSE RAW JSON → normalised ──
function parseRaw(json) {
  const out = {};
  for (const [cat, val] of Object.entries(json)) {
    if (Array.isArray(val)) out[cat] = val;
    else if (typeof val === 'object')
      out[cat] = Object.entries(val).map(([name,qty])=>({
        Name:name, Quantity:typeof qty==='number'?qty:1, Extra:''
      }));
  }
  return out;
}

// ── CARD KEY ──
function cardKey(item) { return item.Name + (item.Extra||''); }

// ── SMART ICON RESOLVER ──
function normalizeStr(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}
function resolveIcon(name) {
  if (ICONS[name]) return ICONS[name];
  let s = name.replace(/\s*\(.*?\)/g,'').trim();
  if (ICONS[s]) return ICONS[s];
  s = s.replace(/\s*\[.*?\]/g,'').trim();
  if (ICONS[s]) return ICONS[s];
  s = s.replace(/\s+\w*\d+\w*$/,'').trim();
  if (ICONS[s]) return ICONS[s];
  // normalize special chars (õ→o etc)
  const normInput = normalizeStr(s);
  for (const key of Object.keys(ICONS)) {
    const k = normalizeStr(key);
    if (normInput===k || normInput.startsWith(k+' ') || k.startsWith(normInput+' ')) return ICONS[key];
  }
  return null;
}

// ── BUILD ONE CARD ──
function buildCard(item, isNew=false) {
  const r   = rarity(item.Name);
  const url = resolveIcon(item.Name);
  const card= document.createElement('div');
  card.className = 'card'+(r?' '+r:'');
  card.dataset.key = cardKey(item);
  const imgHtml = url
    ? `<img class="item-img" src="${url}" alt="${item.Name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>?</div>'">`
    : `<div class="no-img">?</div>`;
  card.innerHTML = `
    <div class="img-wrap">${imgHtml}</div>
    <div class="iname">${item.Name}</div>
    ${item.Extra?`<div class="iextra">${item.Extra}</div>`:''}
    <div class="iqty-wrap"><div class="iqty">×${item.Quantity.toLocaleString()}</div></div>`;
  if (isNew) card.style.animation = 'fadeUp .4s ease both';
  return card;
}

// ── FLASH +N BADGE ──
function flashBadge(card, diff) {
  const old = card.querySelector('.badge-new');
  if (old) old.remove();
  const b = document.createElement('div');
  b.className = 'badge-new';
  b.textContent = '+' + diff.toLocaleString();
  card.appendChild(b);
  setTimeout(()=>b.remove(), 2500);
}

// ── SMART UPDATE ──
function smartUpdate(newData) {
  const main   = document.getElementById('main');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort   = document.getElementById('sortSel').value;
  let firstRender = !Object.keys(prevData).length;

  // full render ครั้งแรก หรือเมื่อ filter/sort เปลี่ยน
  if (firstRender) { data = newData; prevData = newData; render(); return; }

  let totalItems=0, totalQty=0;

  for (const cat of Object.keys(newData)) {
    const newItems = newData[cat] || [];
    const oldItems = prevData[cat] || [];

    // map เก่า
    const oldMap = {};
    oldItems.forEach(i => oldMap[cardKey(i)] = i.Quantity);

    // category section มีอยู่แล้วไหม
    const gid = 'g'+cat.replace(/\W/g,'_');
    let grid = document.getElementById(gid);

    if (!grid) {
      // category ใหม่ทั้งหมด — สร้าง section
      const sec = document.createElement('div');
      sec.className = 'cat-sec';
      sec.innerHTML = `<div class="cat-hdr"><span class="cat-name">${cat}</span><span class="cat-count">0 items</span></div><div class="item-grid" id="${gid}"></div>`;
      sec.style.animation = 'fadeUp .4s ease both';
      main.appendChild(sec);
      grid = sec.querySelector('.item-grid');
    }

    // sort items
    let sorted = [...newItems].filter(i=>!search||i.Name.toLowerCase().includes(search));
    if (sort==='qty-desc') sorted.sort((a,b)=>b.Quantity-a.Quantity);
    else if (sort==='qty-asc') sorted.sort((a,b)=>a.Quantity-b.Quantity);
    else sorted.sort((a,b)=>a.Name.localeCompare(b.Name));

    sorted.forEach(item => {
      const key  = cardKey(item);
      const existing = grid.querySelector(`[data-key="${CSS.escape(key)}"]`);

      if (existing) {
        // ไอเทมเดิม — เช็คจำนวน
        const oldQty = oldMap[key] ?? item.Quantity;
        if (oldQty !== item.Quantity) {
          const qtyEl = existing.querySelector('.iqty');
          const diff  = item.Quantity - oldQty;

          // flip out → เปลี่ยนเลข → flip in
          qtyEl.classList.remove('flip-in');
          qtyEl.classList.add('flip-out');
          setTimeout(() => {
            qtyEl.textContent = '×' + item.Quantity.toLocaleString();
            qtyEl.classList.remove('flip-out');
            qtyEl.classList.add('flip-in');
          }, 150);

          if (diff > 0) flashBadge(existing, diff);
        }
      } else {
        // ไอเทมใหม่
        const card = buildCard(item, true);
        grid.appendChild(card);
        const diff = item.Quantity;
        if (!firstRender) flashBadge(card, diff);
      }
    });

    // อัปเดต count
    const countEl = grid.closest('.cat-sec')?.querySelector('.cat-count');
    if (countEl) countEl.textContent = sorted.length+' items';

    totalItems += sorted.length;
    totalQty   += sorted.reduce((s,i)=>s+i.Quantity,0);
  }

  // empty state
  if (!Object.keys(newData).length) {
    main.innerHTML = `<div class="empty"><div class="empty-title">รอข้อมูลจาก Lua</div><div class="empty-sub">Run Lua script ในเกมก่อนนะ</div></div>`;
  }

  document.getElementById('sItems').textContent = totalItems;
  document.getElementById('sQty').textContent   = totalQty.toLocaleString();
  updateStatsBar(newData);

  prevData = newData;
  data     = newData;
}

// ── DYNAMIC STATS BAR ──
function updateStatsBar(d) {
  const bar = document.getElementById('statsbar');
  // เอา dynamic items เก่าออก (เก็บ 2 อันแรกไว้)
  const fixed = bar.querySelectorAll('.stat-item.total');
  bar.querySelectorAll('.stat-item:not(.total)').forEach(el => el.remove());

  Object.entries(d).forEach(([cat, items]) => {
    const qty = (items||[]).reduce((s,i)=>s+i.Quantity, 0);
    const el  = document.createElement('div');
    el.className = 'stat-item';
    el.innerHTML = `<div class="stat-lbl">${cat.toUpperCase()}</div><div class="stat-val">${qty.toLocaleString()}</div>`;
    bar.appendChild(el);
  });
}

// ── PROCESS DATA ──
function processData(json) {
  const newData = parseRaw(json);

  // เช็คว่ามีอะไรเปลี่ยนไหม
  const newHash = JSON.stringify(newData);
  const oldHash = JSON.stringify(prevData);
  if (newHash === oldHash) return; // ไม่มีอะไรเปลี่ยน ข้ามเลย

  // ตรวจสอบ filter tab ใหม่
  const hadCats = Object.keys(data);
  const newCats  = Object.keys(newData).filter(c=>!hadCats.includes(c));
  if (newCats.length) rebuildFilters(newData);

  smartUpdate(newData);
}

// ── FILTER TABS ──
function rebuildFilters(d) {
  d = d || data;
  const tabs = document.getElementById('filterTabs');
  tabs.innerHTML = `<button class="ftab ${activeFilter==='all'?'active':''}" onclick="setFilter('all',this)">ALL</button>`;
  Object.keys(d).forEach(cat => {
    const b = document.createElement('button');
    b.className = 'ftab'+(activeFilter===cat?' active':'');
    b.textContent = cat.toUpperCase();
    b.onclick = function(){ setFilter(cat,this); };
    tabs.appendChild(b);
  });
}
function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── FULL RENDER (ใช้แค่ตอน filter/sort/search เปลี่ยน) ──
function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort   = document.getElementById('sortSel').value;
  const main   = document.getElementById('main');
  main.innerHTML = '';

  const cats = activeFilter==='all' ? Object.keys(data) : [activeFilter];
  let totalItems=0, totalQty=0, hasAny=false;

  cats.forEach(cat => {
    let items = (data[cat]||[]).filter(i => !search || i.Name.toLowerCase().includes(search));
    if (!items.length) return;
    if (sort==='qty-desc') items.sort((a,b)=>b.Quantity-a.Quantity);
    else if (sort==='qty-asc') items.sort((a,b)=>a.Quantity-b.Quantity);
    else items.sort((a,b)=>a.Name.localeCompare(b.Name));

    hasAny=true; totalItems+=items.length;
    totalQty += items.reduce((s,i)=>s+i.Quantity,0);

    const sec = document.createElement('div');
    sec.className = 'cat-sec';
    sec.innerHTML = `<div class="cat-hdr"><span class="cat-name">${cat}</span><span class="cat-count">${items.length} items</span></div><div class="item-grid" id="g${cat.replace(/\W/g,'_')}"></div>`;
    main.appendChild(sec);

    const grid = sec.querySelector('.item-grid');
    items.forEach((item,i) => {
      const card = buildCard(item);
      card.style.animationDelay = (i*0.03)+'s';
      grid.appendChild(card);
    });
  });

  if (!hasAny) {
    main.innerHTML = `<div class="empty">
      <div class="empty-title">${Object.keys(data).length?'ไม่พบไอเทม':'รอข้อมูลจาก Lua'}</div>
      <div class="empty-sub">${Object.keys(data).length?'ลองค้นหาคำอื่น':'Run Lua script ในเกมก่อนนะ'}</div>
    </div>`;
  }
  document.getElementById('sItems').textContent = totalItems;
  document.getElementById('sQty').textContent   = totalQty.toLocaleString();
  updateStatsBar(data);
}

// ── STATS PARSER ──
function parseStatsData(rawText) {
  const lines = rawText.split('\n').map(l => l.trim()).filter(Boolean);
  const weapons  = [];
  const sections = [];
  let pendingWeaponType = null;
  let currentSection   = null;

  for (const line of lines) {
    const ci = line.indexOf(':');
    if (ci < 0) continue;
    const key = line.slice(0, ci).trim();
    const val = line.slice(ci + 1).trim();
    if (!key) continue;

    if (key === 'WeaponName') {
      pendingWeaponType = val.replace(/:$/, '').trim();
      currentSection = null;

    } else if (key === 'Stat' && pendingWeaponType) {
      if (val && val !== 'Stat Text') {
        weapons.push({ type: pendingWeaponType, name: val });
      }
      pendingWeaponType = null;

    } else if (key === 'StatName') {
      pendingWeaponType = null;
      const inner = val.indexOf(':');
      let category = val.trim(), itemName = '';
      if (inner >= 0) {
        category = val.slice(0, inner).trim();
        itemName = val.slice(inner + 1).trim();
      }
      // skip placeholder rows
      if (category === 'Stat Name' || category === 'StatName') break;
      currentSection = { category, itemName, stats: [] };
      sections.push(currentSection);

    } else if (/^Stat\d+$/.test(key) && currentSection) {
      if (val && val !== 'Stat Text') currentSection.stats.push(val);
    }
  }

  return { weapons, sections };
}

// ── TAG COLOR ──
function tagClass(s) {
  const l = s.toLowerCase();
  if (l.includes('multiplier') || l.includes('x dmg') || l.match(/\d+x\s/)) return 'sp-tag tag-multi';
  if (l.includes('damage') || l.includes('dmg') || l.includes('atk') || l.includes('sword')) return 'sp-tag tag-red';
  if (l.includes('defense') || l.includes('def') || l.includes('reduction') || l.includes('resist') || l.includes('block') || l.includes('cooldown')) return 'sp-tag tag-blue';
  if (l.includes('hp') || l.includes('health') || l.includes('lifesteal') || l.includes('regen')) return 'sp-tag tag-green';
  if (l.includes('luck') || l.includes('cap') || l.includes('dur') || l.includes('tick')) return 'sp-tag tag-purple';
  return 'sp-tag';
}

// ── PROCESS STATS FROM SSE ──
function processStats(statsJson, lastRcv) {
  const wave    = statsJson.wave  || 'Not in Dungeon';
  const rawText = statsJson.stats || '';
  renderStats(wave, rawText, lastRcv);
}

function renderStats(wave, rawText, lastRcv) {
  // Wave display
  const waveEl  = document.getElementById('waveDisplay');
  const waveSub = document.getElementById('waveSub');
  const wm = wave.match(/(\d+)\s*\/\s*(\d+)/);
  if (wm) {
    waveEl.innerHTML = `<span>${wm[1]}</span> / ${wm[2]}`;
    waveSub.textContent = 'IN DUNGEON';
  } else {
    waveEl.innerHTML = `<span style="font-size:22px;color:var(--text3)">${wave}</span>`;
    waveSub.textContent = 'NOT IN DUNGEON';
  }

  if (lastRcv) {
    document.getElementById('statsUpdated').textContent =
      'LAST UPDATE: ' + new Date(lastRcv).toLocaleTimeString('th-TH');
  }

  if (!rawText) return;
  const { weapons, sections } = parseStatsData(rawText);

  // ── Render Equipment ──
  const equipGrid = document.getElementById('spEquipGrid');
  equipGrid.innerHTML = '';
  if (weapons.length) {
    weapons.forEach(w => {
      const icon = resolveIcon(w.name);
      const el = document.createElement('div');
      el.className = 'sp-equip-item';
      el.innerHTML = `
        <div class="sp-equip-type">${w.type}</div>
        <div class="sp-equip-val">
          ${icon ? `<img class="sp-equip-icon" src="${icon}" alt="${w.name}" onerror="this.remove()">` : ''}
          <span>${w.name}</span>
        </div>`;
      equipGrid.appendChild(el);
    });
  } else {
    equipGrid.innerHTML = '<div class="sp-empty-msg">No equipment data received</div>';
  }

  // ── Render Stat Cards (smart order) ──
  const cardsEl = document.getElementById('spStatCards');
  cardsEl.innerHTML = '';

  if (!sections.length) {
    cardsEl.innerHTML = '<div class="sp-empty-msg">Waiting for stats data from Lua...</div>';
    return;
  }

  const ORDER = ['Accessory','Race','Trait','Rune','Artifact','Clan'];
  const sorted = [...sections].sort((a, b) => {
    const ai = ORDER.indexOf(a.category), bi = ORDER.indexOf(b.category);
    if (ai >= 0 && bi >= 0) return ai - bi;
    if (ai >= 0) return -1;
    if (bi >= 0) return 1;
    return a.category.localeCompare(b.category);
  });

  sorted.forEach(sec => {
    const icon     = resolveIcon(sec.itemName);
    const iconHtml = icon
      ? `<img class="sp-card-icon" src="${icon}" alt="${sec.itemName}" onerror="this.remove()">`
      : '';
    const tagsHtml = sec.stats
      .map(s => `<span class="${tagClass(s)}">${s}</span>`)
      .join('');

    const card = document.createElement('div');
    card.className = 'sp-stat-card';
    card.innerHTML = `
      <div class="sp-card-cat">${sec.category.toUpperCase()}</div>
      <div class="sp-card-name">${iconHtml}<span>${sec.itemName || 'None'}</span></div>
      ${sec.stats.length ? `<div class="sp-card-stats">${tagsHtml}</div>` : ''}`;
    cardsEl.appendChild(card);
  });
}

// ── START ──
setStatus('off','NOT CONNECTED');
render();
connectSSE();
</script>
