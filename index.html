<style>
  :root {
    --bg: #0a0a0c;
    --panel: #13131a;
    --panel2: #1a1a24;
    --border: #2a1520;
    --border2: #3d1f2d;
    --red: #c0392b;
    --red2: #e74c3c;
    --redglow: rgba(192,57,43,0.4);
    --redglow2: rgba(231,76,60,0.12);
    --text: #e8ddd0;
    --text2: #9a8a7a;
    --text3: #6a5a4a;
    --gold: #c8a96e;
    --scan: rgba(192,57,43,0.03);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background: repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan) 2px,var(--scan) 4px);
    pointer-events:none;
    z-index:9999;
  }
  .corner { position:fixed; width:50px; height:50px; pointer-events:none; z-index:100; }
  .corner::before,.corner::after { content:''; position:absolute; background:var(--red); }
  .corner::before { width:2px; height:100%; }
  .corner::after  { width:100%; height:2px; }
  .corner.tl { top:10px; left:10px; }
  .corner.tr { top:10px; right:10px; transform:scaleX(-1); }
  .corner.bl { bottom:10px; left:10px; transform:scaleY(-1); }
  .corner.br { bottom:10px; right:10px; transform:scale(-1); }

  /* HEADER */
  header {
    position:sticky; top:0; z-index:50;
    background:var(--bg);
    border-bottom:1px solid var(--border2);
    padding:0 20px;
  }
  .header-inner {
    max-width:1400px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; padding:11px 0; flex-wrap:wrap;
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-box {
    width:34px; height:34px;
    border:2px solid var(--red);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 0 10px var(--redglow);
    position:relative;
  }
  .logo-box::before { content:''; position:absolute; inset:3px; border:1px solid var(--red2); opacity:.4; }
  .logo-box span { font-size:16px; }
  .logo-text { font-family:'Teko',sans-serif; font-size:22px; font-weight:600; letter-spacing:4px; }
  .logo-text em { color:var(--red2); font-style:normal; }
  .hdr-right { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .status-pill { display:flex; align-items:center; gap:6px; font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text2); }
  .dot { width:7px; height:7px; border-radius:50%; background:#2ecc71; box-shadow:0 0 8px #2ecc71; animation:blink 2s infinite; }
  .dot.off { background:var(--red); box-shadow:0 0 8px var(--red); animation:none; }
  .dot.warn { background:#f39c12; box-shadow:0 0 8px #f39c12; animation:blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .ts { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text3); }

  /* TOOLBAR */
  .toolbar {
    max-width:1400px; margin:0 auto;
    padding:14px 20px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;
  }
  .search-wrap { position:relative; flex:1; min-width:180px; }
  .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); width:13px; height:13px; fill:var(--text3); pointer-events:none; }
  .search-input {
    width:100%; background:var(--panel); border:1px solid var(--border2);
    color:var(--text); font-family:'Rajdhani',sans-serif; font-size:15px;
    padding:8px 10px 8px 32px; outline:none; transition:border-color .2s, box-shadow .2s;
  }
  .search-input::placeholder { color:var(--text3); }
  .search-input:focus { border-color:var(--red); box-shadow:0 0 0 1px var(--red),0 0 18px var(--redglow2); }
  .filter-tabs { display:flex; gap:4px; flex-wrap:wrap; }
  .ftab {
    padding:7px 13px; border:1px solid var(--border2); background:var(--panel);
    color:var(--text2); font-family:'Rajdhani',sans-serif; font-size:12px;
    font-weight:600; letter-spacing:1px; cursor:pointer; transition:all .15s; text-transform:uppercase;
  }
  .ftab:hover { border-color:var(--red); color:var(--text); }
  .ftab.active { background:var(--red); border-color:var(--red); color:#fff; box-shadow:0 0 10px var(--redglow); }
  .sort-sel {
    background:var(--panel); border:1px solid var(--border2); color:var(--text);
    font-family:'Rajdhani',sans-serif; font-size:12px; font-weight:600;
    padding:7px 11px; cursor:pointer; outline:none; letter-spacing:1px;
  }
  .sort-sel option { background:var(--panel2); }

  /* STATS */
  .stats { max-width:1400px; margin:0 auto; padding:0 20px 14px; display:flex; gap:12px; flex-wrap:wrap; }
  .chip {
    background:var(--panel); border:1px solid var(--border);
    padding:5px 13px; display:flex; align-items:center; gap:8px;
    font-family:'Share Tech Mono',monospace; font-size:11px;
  }
  .chip-lbl { color:var(--text3); text-transform:uppercase; letter-spacing:1px; }
  .chip-val { color:var(--gold); font-weight:bold; }

  /* MAIN */
  .main { max-width:1400px; margin:0 auto; padding:0 20px 80px; }
  .cat-sec { margin-bottom:26px; }
  .cat-hdr {
    display:flex; align-items:center; gap:10px;
    margin-bottom:11px; padding-bottom:7px;
    border-bottom:1px solid var(--border); position:relative;
  }
  .cat-hdr::before {
    content:''; position:absolute; left:0; bottom:-1px;
    width:50px; height:1px; background:var(--red); box-shadow:0 0 8px var(--redglow);
  }
  .cat-name { font-family:'Teko',sans-serif; font-size:17px; font-weight:500; letter-spacing:3px; text-transform:uppercase; color:var(--red2); }
  .cat-count { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text3); background:var(--panel); border:1px solid var(--border); padding:2px 6px; }
  .item-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:7px; }
  @media(max-width:480px){ .item-grid{ grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:5px; } }

  /* CARD */
  .card {
    background:var(--panel); border:1px solid var(--border);
    padding:11px 9px; display:flex; flex-direction:column; align-items:center; gap:7px;
    transition:border-color .15s, box-shadow .15s, transform .15s;
    position:relative; overflow:hidden;
    animation:fadeUp .3s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
  .card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,var(--redglow2),transparent 60%); opacity:0; transition:opacity .2s; }
  .card:hover { border-color:var(--red); box-shadow:0 0 14px var(--redglow2); transform:translateY(-2px); }
  .card:hover::before { opacity:1; }
  .card.leg { border-color:#8a5e00; }
  .card.leg:hover { border-color:var(--gold); box-shadow:0 0 14px rgba(200,169,110,.3); }
  .card.epic { border-color:#4a1a6a; }
  .card.epic:hover { border-color:#a64dff; box-shadow:0 0 14px rgba(166,77,255,.25); }
  .card.rare { border-color:#1a2a6a; }
  .card.rare:hover { border-color:#4d7aff; box-shadow:0 0 14px rgba(77,122,255,.25); }
  .img-wrap { width:56px; height:56px; display:flex; align-items:center; justify-content:center; }
  @media(max-width:480px){ .img-wrap{ width:44px; height:44px; } }
  .item-img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 5px rgba(0,0,0,.6)); transition:filter .2s; }
  .card:hover .item-img { filter:drop-shadow(0 0 7px var(--redglow)) drop-shadow(0 2px 5px rgba(0,0,0,.6)); }
  .no-img { width:100%; height:100%; background:var(--panel2); border:1px solid var(--border2); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--text3); }
  .iname { font-family:'Rajdhani',sans-serif; font-size:11px; font-weight:600; color:var(--text); text-align:center; line-height:1.2; letter-spacing:.4px; }
  .iextra { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--gold); text-align:center; }
  .iqty { font-family:'Teko',sans-serif; font-size:19px; font-weight:600; color:var(--red2); line-height:1; }

  /* EMPTY */
  .empty { text-align:center; padding:70px 20px; }
  .empty-title { font-family:'Teko',sans-serif; font-size:22px; letter-spacing:4px; text-transform:uppercase; color:var(--text2); margin-bottom:7px; }
  .empty-sub { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text3); line-height:1.9; }

  /* BADGE +N */
  .badge-new {
    position:absolute; top:5px; right:5px;
    background:#0d2e1a; color:#4eff8a;
    font-family:'Share Tech Mono',monospace; font-size:10px; font-weight:bold;
    padding:2px 5px; border:1px solid #2ecc71;
    border-radius:3px; pointer-events:none;
    animation: badgePop .3s ease, badgeFade 2.5s ease forwards;
    z-index:10;
  }
  @keyframes badgePop  { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes badgeFade { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }

  /* QTY flip — เฉพาะตัวเลข ไม่กระทบส่วนอื่น */
  .iqty-wrap { perspective: 200px; display:inline-block; }
  .iqty {
    font-family:'Teko',sans-serif; font-size:19px; font-weight:600;
    color:var(--red2); line-height:1;
    display:inline-block;
    transform-origin: center center;
  }
  .iqty.flip-out {
    animation: flipOut .15s ease-in forwards;
  }
  .iqty.flip-in {
    animation: flipIn .2s ease-out forwards;
  }
  @keyframes flipOut {
    from { transform: rotateX(0deg);   opacity:1; }
    to   { transform: rotateX(90deg);  opacity:0; color:#4eff8a; }
  }
  @keyframes flipIn {
    from { transform: rotateX(-90deg); opacity:0; color:#4eff8a; }
    to   { transform: rotateX(0deg);   opacity:1; color:var(--red2); }
  }
</style>
</head>

</header>

<div class="toolbar">

    <input class="search-input" type="text" id="searchInput" placeholder="ค้นหาไอเทม..." oninput="render()">
  </div>
  <div class="filter-tabs" id="filterTabs">
    <button class="ftab active" onclick="setFilter('all',this)">ALL</button>
  </div>
  <select class="sort-sel" id="sortSel" onchange="render()">
    <option value="name">ชื่อ A-Z</option>
    <option value="qty-desc">จำนวน มาก→น้อย</option>
    <option value="qty-asc">จำนวน น้อย→มาก</option>
  </select>
</div>

<div class="stats">

  <div class="chip"><span class="chip-lbl">TOTAL QTY</span><span class="chip-val" id="sQty">0</span></div>
</div>

<div class="main" id="main"></div>

  "Tower Token":"https://i.postimg.cc/DJQs0qFQ/Tower-Token.png",
  "Trait Reroll":"https://i.postimg.cc/0MGmjpxc/Trait-Reroll.png",
  "Umbral Capsule":"https://i.postimg.cc/PpbZJmhV/Umbral-Capsule.png",
  "Void Fragment":"https://i.postimg.cc/BL5Dbxsd/Void-Fragment.png",
  "Void Seed":"https://i.postimg.cc/D42GX8yY/Void-Seed.png",
  "Wood":"https://i.postimg.cc/GTcDyHmn/Wood.png",
  "Worthiness Fragment":"https://i.postimg.cc/rR84rKwk/Worthiness-Fragment.png",
  "Wrath Rune":"https://i.postimg.cc/7Jxz2fZx/Wrath-Rune.png",
  "Yuji Hair":"https://i.postimg.cc/q6kK3zvJ/Yuji-Hair.png",
};

function rarity(name) {
  const n = name.toLowerCase();
  if(['mythical','legendary','empress','escanor','ichigo','gryphon','jinwoo','saber alter'].some(k=>n.includes(k))) return 'leg';
  if(['epic','corrupt','imperial','calamity','shadow','abyssal','infinity','atomic'].some(k=>n.includes(k))) return 'epic';
  if(['rare','soul','crimson','dark','frozen','celestial','demonic'].some(k=>n.includes(k))) return 'rare';
  return '';
}

// ── STATE ──
let data     = {};
let prevData = {};
let activeFilter = 'all';

// ── STATUS ──
function setStatus(state, txt) {
  const d = document.getElementById('dot');
  d.className = 'dot' + (state==='ok'?'': state==='warn'?' warn':' off');
  document.getElementById('statusTxt').textContent = txt;
}
function setTs() {
  document.getElementById('tsTxt').textContent = new Date().toLocaleTimeString('th-TH');
}

// ── SSE CONNECTION ──
function connectSSE() {
  setStatus('warn', 'CONNECTING...');
  const es = new EventSource('/events');
  es.onopen = () => setStatus('warn', 'WAITING FOR LUA...');
  es.onmessage = (e) => {
    try {
      const json = JSON.parse(e.data);
      if (!json.inventory || !Object.keys(json.inventory).length) return;
      processData(json.inventory);
      setStatus('ok', 'LIVE · ' + new Date(json.lastReceived).toLocaleTimeString('th-TH'));
      setTs();
    } catch {}
  };
  es.onerror = () => {
    setStatus('off', 'DISCONNECTED...');
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── PARSE RAW JSON → normalised ──
function parseRaw(json) {
  const out = {};
  for (const [cat, val] of Object.entries(json)) {
    if (Array.isArray(val)) out[cat] = val;
    else if (typeof val === 'object')
      out[cat] = Object.entries(val).map(([name,qty])=>({
        Name:name, Quantity:typeof qty==='number'?qty:1, Extra:''
      }));
  }
  return out;
}

// ── CARD KEY ──
function cardKey(item) { return item.Name + (item.Extra||''); }

// ── SMART ICON RESOLVER ──
function resolveIcon(name) {
  // 1. ตรงๆก่อน
  if (ICONS[name]) return ICONS[name];

  // 2. strip วงเล็บ เช่น (Untradeable) (Locked) (x2)
  let s = name.replace(/\s*\(.*?\)/g, '').trim();
  if (ICONS[s]) return ICONS[s];

  // 3. strip [E5][B2][B10] ฯลฯ
  s = s.replace(/\s*\[.*?\]/g, '').trim();
  if (ICONS[s]) return ICONS[s];

  // 4. strip ตัวเลขท้าย เช่น "Iron II" → "Iron"
  s = s.replace(/\s+\w*\d+\w*$/, '').trim();
  if (ICONS[s]) return ICONS[s];

  // 5. fuzzy — ICONS key ที่ name ขึ้นต้นด้วย หรือ key ขึ้นต้นด้วย s
  const low = s.toLowerCase();
  for (const key of Object.keys(ICONS)) {
    const k = key.toLowerCase();
    if (low === k || low.startsWith(k+' ') || k.startsWith(low+' ')) return ICONS[key];
  }

  return null;
}

// ── BUILD ONE CARD ──
function buildCard(item, isNew=false) {
  const r   = rarity(item.Name);
  const url = resolveIcon(item.Name);
  const card= document.createElement('div');
  card.className = 'card'+(r?' '+r:'');
  card.dataset.key = cardKey(item);
  const imgHtml = url
    ? `<img class="item-img" src="${url}" alt="${item.Name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>?</div>'">`
    : `<div class="no-img">?</div>`;
  card.innerHTML = `
    <div class="img-wrap">${imgHtml}</div>
    <div class="iname">${item.Name}</div>
    ${item.Extra?`<div class="iextra">${item.Extra}</div>`:''}
    <div class="iqty-wrap"><div class="iqty">×${item.Quantity.toLocaleString()}</div></div>`;
  if (isNew) card.style.animation = 'fadeUp .4s ease both';
  return card;
}

// ── FLASH +N BADGE ──
function flashBadge(card, diff) {
  const old = card.querySelector('.badge-new');
  if (old) old.remove();
  const b = document.createElement('div');
  b.className = 'badge-new';
  b.textContent = '+' + diff.toLocaleString();
  card.appendChild(b);
  setTimeout(()=>b.remove(), 2500);
}

// ── SMART UPDATE ──
function smartUpdate(newData) {
  const main   = document.getElementById('main');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort   = document.getElementById('sortSel').value;
  let firstRender = !Object.keys(prevData).length;

  // full render ครั้งแรก หรือเมื่อ filter/sort เปลี่ยน
  if (firstRender) { data = newData; prevData = newData; render(); return; }

  let totalItems=0, totalQty=0;

  for (const cat of Object.keys(newData)) {
    const newItems = newData[cat] || [];
    const oldItems = prevData[cat] || [];

    // map เก่า
    const oldMap = {};
    oldItems.forEach(i => oldMap[cardKey(i)] = i.Quantity);

    // category section มีอยู่แล้วไหม
    const gid = 'g'+cat.replace(/\W/g,'_');
    let grid = document.getElementById(gid);

    if (!grid) {
      // category ใหม่ทั้งหมด — สร้าง section
      const sec = document.createElement('div');
      sec.className = 'cat-sec';
      sec.innerHTML = `<div class="cat-hdr"><span class="cat-name">${cat}</span><span class="cat-count">0 items</span></div><div class="item-grid" id="${gid}"></div>`;
      sec.style.animation = 'fadeUp .4s ease both';
      main.appendChild(sec);
      grid = sec.querySelector('.item-grid');
    }

    // sort items
    let sorted = [...newItems].filter(i=>!search||i.Name.toLowerCase().includes(search));
    if (sort==='qty-desc') sorted.sort((a,b)=>b.Quantity-a.Quantity);
    else if (sort==='qty-asc') sorted.sort((a,b)=>a.Quantity-b.Quantity);
    else sorted.sort((a,b)=>a.Name.localeCompare(b.Name));

    sorted.forEach(item => {
      const key  = cardKey(item);
      const existing = grid.querySelector(`[data-key="${CSS.escape(key)}"]`);

      if (existing) {
        // ไอเทมเดิม — เช็คจำนวน
        const oldQty = oldMap[key] ?? item.Quantity;
        if (oldQty !== item.Quantity) {
          const qtyEl = existing.querySelector('.iqty');
          const diff  = item.Quantity - oldQty;

          // flip out → เปลี่ยนเลข → flip in
          qtyEl.classList.remove('flip-in');
          qtyEl.classList.add('flip-out');
          setTimeout(() => {
            qtyEl.textContent = '×' + item.Quantity.toLocaleString();
            qtyEl.classList.remove('flip-out');
            qtyEl.classList.add('flip-in');
          }, 150);

          if (diff > 0) flashBadge(existing, diff);
        }
      } else {
        // ไอเทมใหม่
        const card = buildCard(item, true);
        grid.appendChild(card);
        const diff = item.Quantity;
        if (!firstRender) flashBadge(card, diff);
      }
    });

    // อัปเดต count
    const countEl = grid.closest('.cat-sec')?.querySelector('.cat-count');
    if (countEl) countEl.textContent = sorted.length+' items';

    totalItems += sorted.length;
    totalQty   += sorted.reduce((s,i)=>s+i.Quantity,0);
  }

  // empty state
  if (!Object.keys(newData).length) {
    main.innerHTML = `<div class="empty"><div class="empty-title">รอข้อมูลจาก Lua</div><div class="empty-sub">Run Lua script ในเกมก่อนนะ</div></div>`;
  }

  document.getElementById('sItems').textContent = totalItems;
  document.getElementById('sCats').textContent  = Object.keys(newData).length;
  document.getElementById('sQty').textContent   = totalQty.toLocaleString();

  prevData = newData;
  data     = newData;
}

// ── PROCESS DATA ──
function processData(json) {
  const newData = parseRaw(json);

  // เช็คว่ามีอะไรเปลี่ยนไหม
  const newHash = JSON.stringify(newData);
  const oldHash = JSON.stringify(prevData);
  if (newHash === oldHash) return; // ไม่มีอะไรเปลี่ยน ข้ามเลย

  // ตรวจสอบ filter tab ใหม่
  const hadCats = Object.keys(data);
  const newCats  = Object.keys(newData).filter(c=>!hadCats.includes(c));
  if (newCats.length) rebuildFilters(newData);

  smartUpdate(newData);
}

// ── FILTER TABS ──
function rebuildFilters(d) {
  d = d || data;
  const tabs = document.getElementById('filterTabs');
  tabs.innerHTML = `<button class="ftab ${activeFilter==='all'?'active':''}" onclick="setFilter('all',this)">ALL</button>`;
  Object.keys(d).forEach(cat => {
    const b = document.createElement('button');
    b.className = 'ftab'+(activeFilter===cat?' active':'');
    b.textContent = cat.toUpperCase();
    b.onclick = function(){ setFilter(cat,this); };
    tabs.appendChild(b);
  });
}
function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── FULL RENDER (ใช้แค่ตอน filter/sort/search เปลี่ยน) ──
function render() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort   = document.getElementById('sortSel').value;
  const main   = document.getElementById('main');
  main.innerHTML = '';

  const cats = activeFilter==='all' ? Object.keys(data) : [activeFilter];
  let totalItems=0, totalQty=0, hasAny=false;

  cats.forEach(cat => {
    let items = (data[cat]||[]).filter(i => !search || i.Name.toLowerCase().includes(search));
    if (!items.length) return;
    if (sort==='qty-desc') items.sort((a,b)=>b.Quantity-a.Quantity);
    else if (sort==='qty-asc') items.sort((a,b)=>a.Quantity-b.Quantity);
    else items.sort((a,b)=>a.Name.localeCompare(b.Name));

    hasAny=true; totalItems+=items.length;
    totalQty += items.reduce((s,i)=>s+i.Quantity,0);

    const sec = document.createElement('div');
    sec.className = 'cat-sec';
    sec.innerHTML = `<div class="cat-hdr"><span class="cat-name">${cat}</span><span class="cat-count">${items.length} items</span></div><div class="item-grid" id="g${cat.replace(/\W/g,'_')}"></div>`;
    main.appendChild(sec);

    const grid = sec.querySelector('.item-grid');
    items.forEach((item,i) => {
      const card = buildCard(item);
      card.style.animationDelay = (i*0.03)+'s';
      grid.appendChild(card);
    });
  });

  if (!hasAny) {
    main.innerHTML = `<div class="empty">
      <div class="empty-title">${Object.keys(data).length?'ไม่พบไอเทม':'รอข้อมูลจาก Lua'}</div>
      <div class="empty-sub">${Object.keys(data).length?'ลองค้นหาคำอื่น':'Run Lua script ในเกมก่อนนะ'}</div>
    </div>`;
  }
  document.getElementById('sItems').textContent = totalItems;
  document.getElementById('sCats').textContent  = Object.keys(data).length;
  document.getElementById('sQty').textContent   = totalQty.toLocaleString();
}

// ── START ──
setStatus('off','NOT CONNECTED');
render();
connectSSE();
</script>
